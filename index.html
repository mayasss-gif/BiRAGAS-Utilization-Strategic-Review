<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiRAGAS Utilization & Revenue Potential — Strategic Presentation</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
    --navy: #0B1F3A;
    --navy-deep: #050E1F;
    --navy-soft: #14305B;
    --gold: #C9A227;
    --gold-soft: #E8C76A;
    --gold-deep: #8A6D3B;
    --cream: #F5EFE0;
    --slate: #E6EAF0;
    --slate-dim: #A8B3C5;
    --green: #4CAF50;
    --green-soft: #81C784;
    --teal: #4FC3F7;
    --purple: #BA68C8;
    --red: #E57373;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--slate);
}
.bg-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0;
    background: radial-gradient(ellipse at center, var(--navy-soft) 0%, var(--navy) 35%, var(--navy-deep) 100%);
}
#particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
.aurora {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 2; pointer-events: none;
    background:
        radial-gradient(ellipse 1200px 600px at 20% 30%, rgba(201,162,39,.10), transparent 60%),
        radial-gradient(ellipse 1000px 500px at 80% 70%, rgba(20,48,91,.4), transparent 60%),
        radial-gradient(ellipse 800px 400px at 50% 50%, rgba(76,175,80,.05), transparent 60%);
    animation: auroraMove 20s ease-in-out infinite alternate;
}
@keyframes auroraMove { 0%{transform:translate(0,0)scale(1);} 50%{transform:translate(-30px,20px)scale(1.05);} 100%{transform:translate(20px,-15px)scale(1);} }
.helix {
    position: fixed; right: 40px; top: 50%; transform: translateY(-50%);
    width: 60px; height: 400px; z-index: 3; opacity: 0.15; pointer-events: none;
}
.helix::before, .helix::after {
    content: ""; position: absolute; left: 50%; width: 5px; height: 100%;
    background: linear-gradient(to bottom, transparent, var(--gold-soft), transparent);
    transform-origin: center;
}
.helix::before { animation: helixA 8s linear infinite; }
.helix::after { animation: helixB 8s linear infinite; }
@keyframes helixA { 0%{transform:translateX(-50%) rotateY(0deg);} 100%{transform:translateX(-50%) rotateY(360deg);} }
@keyframes helixB { 0%{transform:translateX(-50%) rotateY(180deg);} 100%{transform:translateX(-50%) rotateY(540deg);} }

.stage {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 30px;
}
.slide {
    position: absolute;
    width: 94%; max-width: 1400px;
    height: 90%; max-height: 820px;
    padding: 38px 56px;
    background: rgba(11, 31, 58, 0.62);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    border: 1px solid rgba(201,162,39,.30);
    border-radius: 16px;
    box-shadow: 0 30px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
    overflow: hidden;
    display: none;
    flex-direction: column;
    opacity: 0; transform: translateY(20px);
    transition: opacity .55s ease, transform .55s ease;
}
.slide.active { display: flex; opacity: 1; transform: translateY(0); }

.slide-eyebrow {
    color: var(--gold-soft);
    font-size: 12px; font-weight: 600;
    letter-spacing: 2.5px; text-transform: uppercase;
    margin-bottom: 8px;
}
.slide-title {
    color: #FFFFFF;
    font-size: 32px; font-weight: 700;
    letter-spacing: -0.5px; line-height: 1.15;
    margin-bottom: 6px;
}
.slide-subtitle {
    color: var(--gold-soft);
    font-size: 15px; font-weight: 400;
    font-style: italic; line-height: 1.4;
    margin-bottom: 14px;
}
.divider {
    width: 70px; height: 3px;
    background: linear-gradient(90deg, var(--gold), transparent);
    border-radius: 2px; margin-bottom: 14px;
}
.slide-body {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
    gap: 10px;
}
.slide-body p { color: var(--slate); font-size: 14.5px; line-height: 1.5; }
.lead { font-size: 16px; color: #FFFFFF; line-height: 1.5; }

/* Layout: left content + right chart */
.split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    flex: 1;
    min-height: 0;
}
.split-left { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
.split-right { position: relative; min-height: 0; min-width: 0; }
.chart-box {
    width: 100%; height: 100%;
    min-height: 280px;
    background: rgba(5, 14, 31, 0.4);
    border: 1px solid rgba(201, 162, 39, 0.2);
    border-radius: 10px;
    padding: 14px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
}
.chart-box canvas { max-width: 100%; max-height: 100%; }
.chart-title {
    position: absolute; top: 8px; left: 14px;
    color: var(--gold-soft); font-size: 11px;
    letter-spacing: 1.2px; text-transform: uppercase; font-weight: 700;
}

/* Full-width chart variant */
.chart-full {
    width: 100%; flex: 1;
    background: rgba(5,14,31,.4);
    border: 1px solid rgba(201,162,39,.2);
    border-radius: 10px;
    padding: 18px;
    position: relative;
    min-height: 0;
}

/* KPI grid */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 4px 0 10px;
}
.kpi-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.kpi {
    padding: 12px 10px;
    background: linear-gradient(160deg, rgba(20,48,91,.7), rgba(11,31,58,.4));
    border: 1px solid rgba(201,162,39,.25);
    border-radius: 10px;
    text-align: center;
}
.kpi-label {
    color: var(--gold-soft);
    font-size: 9.5px; font-weight: 600;
    letter-spacing: 1.2px; text-transform: uppercase;
    margin-bottom: 4px;
}
.kpi-value { color: #FFFFFF; font-size: 22px; font-weight: 700; line-height: 1.1; }
.kpi-sub { color: var(--slate-dim); font-size: 10px; margin-top: 3px; }

/* Bullets */
.bullets { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.bullets li {
    position: relative; padding-left: 22px;
    font-size: 14px; color: var(--slate); line-height: 1.5;
}
.bullets li::before {
    content: "▸"; position: absolute; left: 0; top: 0;
    color: var(--gold); font-weight: bold;
}
.bullets li strong { color: #FFFFFF; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; margin: 4px 0; font-size: 12.5px; }
.tbl th {
    background: var(--navy-deep); color: var(--gold-soft);
    padding: 8px 10px; text-align: left; font-weight: 600;
    font-size: 11px; letter-spacing: .8px; text-transform: uppercase;
    border-bottom: 2px solid var(--gold);
}
.tbl td {
    padding: 7px 10px; color: var(--slate);
    border-bottom: 1px solid rgba(201,162,39,.12);
}
.tbl tr:nth-child(even) td { background: rgba(11,31,58,.35); }
.tbl td:first-child { color: #FFFFFF; font-weight: 600; }
.tbl tr.highlight td { background: rgba(201,162,39,.14); color: #FFF; font-weight: 700; }

/* Two-col */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.col-card {
    padding: 14px 16px;
    background: rgba(20,48,91,.45);
    border-left: 4px solid var(--gold);
    border-radius: 6px;
}
.col-card h3 { color: var(--gold-soft); font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.col-card p, .col-card li { font-size: 13px; color: var(--slate); line-height: 1.45; }

/* Callout */
.callout {
    margin: 8px 0; padding: 12px 16px;
    background: linear-gradient(135deg, rgba(201,162,39,.18), rgba(201,162,39,.05));
    border-left: 4px solid var(--gold);
    border-radius: 6px;
}
.callout-title {
    color: var(--gold-soft); font-size: 11.5px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px;
}
.callout p { color: #FFFFFF; font-size: 13.5px; line-height: 1.45; }

/* Cover */
.cover { text-align: center; justify-content: center; align-items: center; padding: 60px; }
.cover-brand {
    font-size: 82px; font-weight: 800;
    background: linear-gradient(135deg, #FFFFFF 0%, var(--gold-soft) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -3px; margin-bottom: 14px;
}
.cover-tag { color: var(--gold-soft); font-size: 20px; font-style: italic; margin-bottom: 30px; line-height: 1.4; }
.cover-meta { color: var(--slate-dim); font-size: 13px; letter-spacing: 1.5px; }
.cover-divider {
    width: 200px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto;
}

/* Section divider */
.section-divider { text-align: center; justify-content: center; align-items: center; }
.section-number {
    color: var(--gold); font-size: 130px; font-weight: 800;
    line-height: 1; opacity: 0.85;
    text-shadow: 0 4px 40px rgba(201,162,39,.4);
}
.section-title { color: #FFFFFF; font-size: 40px; font-weight: 700; margin-top: 20px; }
.section-tag { color: var(--gold-soft); font-size: 17px; font-style: italic; margin-top: 12px; }

/* Controls */
.controls {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    background: rgba(5,14,31,.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(201,162,39,.4);
    border-radius: 50px;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
}
.ctrl-btn {
    background: none; border: 1px solid var(--gold);
    color: var(--gold-soft); width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
}
.ctrl-btn:hover { background: var(--gold); color: var(--navy-deep); transform: scale(1.05); }
.ctrl-btn.play-active { background: var(--green); border-color: var(--green); color: #FFF; }
.ctrl-btn.mute-active { background: var(--red); border-color: var(--red); color: #FFF; }
.slide-counter {
    color: var(--slate); font-size: 12.5px; font-weight: 600;
    padding: 0 10px;
    border-left: 1px solid rgba(201,162,39,.3);
    border-right: 1px solid rgba(201,162,39,.3);
    min-width: 78px; text-align: center;
}
.progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-soft));
    z-index: 200;
    box-shadow: 0 0 12px var(--gold);
    transition: width .4s ease;
}

/* Speech indicator */
.speech-indicator {
    position: fixed; top: 14px; right: 22px; z-index: 100;
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: rgba(5,14,31,.85);
    border: 1px solid rgba(201,162,39,.4);
    border-radius: 24px;
    color: var(--slate); font-size: 11px; font-weight: 600; letter-spacing: .5px;
}
.speech-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--slate-dim); }
.speech-dot.speaking { background: var(--gold); animation: pulse 1s ease-in-out infinite; box-shadow: 0 0 12px var(--gold); }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.5);opacity:.6;} }

/* Brand bug */
.brand-bug {
    position: absolute; top: 22px; right: 28px;
    color: var(--gold-soft); font-size: 11px;
    font-weight: 700; letter-spacing: 2px; opacity: .6;
}

/* Voice selector */
.voice-pick {
    position: fixed; top: 14px; left: 22px; z-index: 100;
    padding: 6px 10px;
    background: rgba(5,14,31,.85);
    border: 1px solid rgba(201,162,39,.4);
    border-radius: 8px;
    color: var(--slate); font-size: 11px;
    max-width: 320px;
}
.voice-pick select {
    background: var(--navy-deep);
    color: var(--gold-soft);
    border: 1px solid var(--gold);
    padding: 3px 6px; border-radius: 4px;
    font-size: 11px; max-width: 240px;
}
.voice-quality {
    display: inline-block;
    background: var(--gold);
    color: var(--navy-deep);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    margin-left: 6px;
    letter-spacing: .5px;
}

/* Hint */
.hint {
    position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
    z-index: 99;
    padding: 6px 14px;
    background: rgba(201,162,39,.12);
    border: 1px solid rgba(201,162,39,.5);
    border-radius: 20px;
    color: var(--gold-soft); font-size: 11px; letter-spacing: .8px;
    animation: fadeOut 7s ease-out forwards;
}
@keyframes fadeOut { 0%,75%{opacity:1;} 100%{opacity:0;visibility:hidden;} }

/* Mini metric */
.mini-metric {
    padding: 10px;
    background: rgba(20,48,91,.5);
    border-radius: 8px;
    border-top: 3px solid var(--gold);
    text-align: center;
}
.mini-metric .v { color: var(--gold-soft); font-size: 18px; font-weight: 700; }
.mini-metric .l { color: var(--slate); font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>
<canvas id="particles"></canvas>
<div class="aurora"></div>
<div class="helix"></div>

<div class="progress-bar" id="progressBar" style="width:0%"></div>

<div class="speech-indicator">
    <div class="speech-dot" id="speechDot"></div>
    <span id="speechStatus">READY</span>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<div class="hint">← → SPACE to navigate · M mute · A auto-advance · R replay narration</div>

<div class="stage" id="stage"></div>

<div class="controls">
    <button class="ctrl-btn" id="btnPrev" title="Previous">‹</button>
    <button class="ctrl-btn" id="btnRestart" title="Replay narration">⟲</button>
    <button class="ctrl-btn" id="btnMute" title="Mute">♪</button>

/* ============================================
   RENDER SLIDES
============================================ */
const stage = document.getElementById('stage');
const chartInstances = {};

SLIDES.forEach((s, idx) => {
    const div = document.createElement('div');
    div.className = 'slide';
    if (s.type === 'cover') div.classList.add('cover');
    if (s.type === 'section') div.classList.add('section-divider');
    div.id = `slide-${idx}`;
    let inner = '';

    if (s.type !== 'cover' && s.type !== 'section') {
        inner += `<div class="brand-bug">BiRAGAS™</div>`;
        if (s.eyebrow) inner += `<div class="slide-eyebrow">${s.eyebrow}</div>`;
        if (s.title) inner += `<div class="slide-title">${s.title}</div>`;
        if (s.subtitle) inner += `<div class="slide-subtitle">${s.subtitle}</div>`;
        inner += `<div class="divider"></div>`;
        inner += `<div class="slide-body">`;

        if (s.layout === 'split') {
            inner += `<div class="split">`;
            inner += `<div class="split-left">${s.bodyLeft || s.body || ''}</div>`;
            inner += `<div class="split-right"><div class="chart-box">`;
            if (s.chartTitle) inner += `<div class="chart-title">${s.chartTitle}</div>`;
            inner += `<canvas id="chart-${idx}"></canvas></div></div>`;
            inner += `</div>`;
        } else if (s.layout === 'full-chart') {
            inner += `<div class="chart-full">`;
            if (s.chartTitle) inner += `<div class="chart-title">${s.chartTitle}</div>`;
            inner += `<canvas id="chart-${idx}" style="width:100%;height:100%;"></canvas></div>`;
        } else {
            inner += s.body || '';
        }
        inner += `</div>`;
    } else {
        inner = s.body || '';
    }
    div.innerHTML = inner;
    stage.appendChild(div);
});

function buildChart(idx) {
    const s = SLIDES[idx];
    if (!s.chart) return;
    if (chartInstances[idx]) return;
    const canvas = document.getElementById(`chart-${idx}`);
    if (!canvas || !window.Chart) return;
    const ctx = canvas.getContext('2d');
    chartInstances[idx] = new Chart(ctx, s.chart);
}

/* ============================================
   STATE & NAVIGATION
============================================ */
let current = 0;
let muted = false;
let autoAdvance = false;
let autoTimer = null;
const counter = document.getElementById('counter');
const progressBar = document.getElementById('progressBar');
const speechDot = document.getElementById('speechDot');
const speechStatus = document.getElementById('speechStatus');
counter.textContent = `1 / ${SLIDES.length}`;

function updateCounter() {
    counter.textContent = `${current + 1} / ${SLIDES.length}`;
    progressBar.style.width = `${((current + 1) / SLIDES.length) * 100}%`;
}

function showSlide(idx) {
    document.querySelectorAll('.slide').forEach((s, i) => {
        s.classList.toggle('active', i === idx);
    });
    current = idx;
    updateCounter();
    // Build chart for active slide (lazy)
    setTimeout(() => buildChart(idx), 80);
    // Stop any prior narration before swapping source
    stopSpeak();
    if (!muted) playSlideAudio(idx);
    // No fixed timer — auto-advance fires on the audio's "ended" event instead.
    // Fallback safety timer kicks in only if audio fails to load within 90s.
    if (autoAdvance) armFallbackTimer();
}

function next() {
    if (current < SLIDES.length - 1) showSlide(current + 1);
    else if (autoAdvance) toggleAuto();
}
function prev() { if (current > 0) showSlide(current - 1); }

/* ============================================
   PRE-RECORDED AUDIO NARRATION
   Each slide has a corresponding audio/slide_N.m4a file
============================================ */
const audioPlayer = document.getElementById('audioPlayer');

function playSlideAudio(idx) {
    if (muted) return;
    const src = `audio/slide_${idx + 1}.mp3`;
    audioPlayer.src = src;
    audioPlayer.currentTime = 0;
    audioPlayer.play().then(() => {
        speechDot.classList.add('speaking');
        speechStatus.textContent = 'NARRATING';
    }).catch(err => {
        // Autoplay blocked until user interaction — that's fine
        speechDot.classList.remove('speaking');
        speechStatus.textContent = 'CLICK TO START';
    });
}

audioPlayer.addEventListener('ended', () => {
    speechDot.classList.remove('speaking');
    speechStatus.textContent = 'READY';
    // Audio finished — if auto-advance is on, move to next slide after a brief pause
    if (autoAdvance) {
        clearTimeout(autoTimer);
        autoTimer = setTimeout(() => {
            if (autoAdvance) next();
        }, 1500); // 1.5s pause between slides for natural rhythm
    }
});

audioPlayer.addEventListener('pause', () => {
    if (audioPlayer.currentTime < audioPlayer.duration) return;
    speechDot.classList.remove('speaking');
    speechStatus.textContent = 'READY';
});

function stopSpeak() {
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
    speechDot.classList.remove('speaking');
    speechStatus.textContent = 'READY';
    // Cancel any pending auto-advance so a stale timer can't fire mid-slide
    clearTimeout(autoTimer);
}

function speak(_text) {
    // Kept for compatibility — narration is now via playSlideAudio(idx)
    playSlideAudio(current);
}

/* ============================================
   CONTROLS
============================================ */
document.getElementById('btnNext').addEventListener('click', next);
document.getElementById('btnPrev').addEventListener('click', prev);
document.getElementById('btnRestart').addEventListener('click', () => {
    stopSpeak();
    if (!muted) playSlideAudio(current);
});

const btnMute = document.getElementById('btnMute');
btnMute.addEventListener('click', () => {
    muted = !muted;
    btnMute.classList.toggle('mute-active', muted);
    btnMute.textContent = muted ? '✕' : '♪';
    btnMute.title = muted ? 'Unmute' : 'Mute';
    if (muted) stopSpeak();
});

const btnAuto = document.getElementById('btnAuto');

// Fallback timer: only used if the audio file never loads / fires `ended`.
// Real auto-advance is driven by the audioPlayer 'ended' event handler.
function armFallbackTimer() {
    clearTimeout(autoTimer);
    autoTimer = setTimeout(() => {
        // Audio never finished after 90s — advance anyway so the deck doesn't stall
        if (autoAdvance) next();
    }, 90000);
}

function toggleAuto() {
    autoAdvance = !autoAdvance;
    btnAuto.classList.toggle('play-active', autoAdvance);
    btnAuto.textContent = autoAdvance ? '❚❚' : '▶';
    btnAuto.title = autoAdvance ? 'Stop auto-advance' : 'Auto-advance';
    if (autoAdvance) {
        armFallbackTimer();
        // If audio is already over by the time auto-advance is enabled, jump ahead
        if (audioPlayer.ended || audioPlayer.paused && audioPlayer.currentTime > 0) {
            setTimeout(() => { if (autoAdvance) next(); }, 1500);
        }
    } else {
        clearTimeout(autoTimer);
    }
}
btnAuto.addEventListener('click', toggleAuto);

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft') { prev(); }
    else if (e.key === 'm' || e.key === 'M') { btnMute.click(); }
    else if (e.key === 'a' || e.key === 'A') { btnAuto.click(); }
    else if (e.key === 'r' || e.key === 'R') { document.getElementById('btnRestart').click(); }
    else if (e.key === 'Home') { showSlide(0); }
    else if (e.key === 'End')  { showSlide(SLIDES.length - 1); }
});

/* ============================================
   PARTICLE BACKGROUND
============================================ */
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 70;
function resizeCanvas() { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
    constructor() { this.reset(true); }
    reset() {
        this.x = Math.random() * pCanvas.width;
        this.y = Math.random() * pCanvas.height;
        this.vx = (Math.random() - 0.5) * 0.35;
        this.vy = (Math.random() - 0.5) * 0.35;
        this.r = Math.random() * 1.8 + 0.6;
        this.alpha = Math.random() * 0.45 + 0.15;
        this.hue = Math.random() < 0.6 ? 'gold' : 'cyan';
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > pCanvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > pCanvas.height) this.vy *= -1;
    }
    draw() {
        pCtx.beginPath();
        const color = this.hue === 'gold'
            ? `rgba(201,162,39,${this.alpha})`
            : `rgba(80,160,220,${this.alpha * 0.7})`;
        pCtx.fillStyle = color;
        pCtx.shadowBlur = 8;
        pCtx.shadowColor = color;
        pCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        pCtx.fill();
        pCtx.shadowBlur = 0;
    }
}
for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < 140) {
                pCtx.beginPath();
                pCtx.strokeStyle = `rgba(201,162,39,${(140 - d) / 140 * 0.18})`;
                pCtx.lineWidth = 0.5;
                pCtx.moveTo(particles[i].x, particles[i].y);
                pCtx.lineTo(particles[j].x, particles[j].y);
                pCtx.stroke();
            }
        }
    }
}

function animate() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    drawConnections();
    requestAnimationFrame(animate);
}
animate();

/* ============================================
   BOOT
============================================ */
showSlide(0);

let firstInteraction = true;
document.addEventListener('click', () => {
    if (firstInteraction) {
        firstInteraction = false;
        if (!muted) playSlideAudio(current);
    }
}, { once: true });

</script>
